backend: vllm
mode: serve
model_id: Qwen/Qwen2.5-1.5B-Instruct
base_url: https://your-workspace-name--example-vllm-inference-serve.modal.run
hardware:
  provider: modal
  accelerator: replace-with-modal-gpu-sku
  accelerator_count: 1
  notes:
    - Replace base_url, metrics.scrape_endpoint, and hardware metadata before a real M2 run.
    - Start from Modal's official vLLM example and keep the first proof pinned to a single replica.
    - This file is an example config, not evidence of a currently live deployment.

launch:
  attach_mode: external
  startup_timeout_seconds: 120
  healthcheck_interval_seconds: 1.0
  request_timeout_seconds: 60

metrics:
  scrape_endpoint: https://your-workspace-name--example-vllm-inference-serve.modal.run/metrics
  scrape_interval_seconds: 2

artifacts:
  capture_runtime_metadata: true
  write_plots: true
